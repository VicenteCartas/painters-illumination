<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>2f. Painter's Light (Planar-Distance Directional) — Illumination Models</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none
        }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="shared/scene-setup.js"></script>
    <script src="shared/light-indicator.js"></script>
    <script src="shared/gui.js"></script>
    <script>
        /*  =============================================================
            2f.  PAINTER'S LIGHT  (Planar-Distance Directional)
            =============================================================
            Painters don't think about point lights or perfect
            directional lights.  They imagine a PLANE OF LIGHT at a
            certain position — sunlight through a window, studio
            softbox, a cloudy sky panel — that sends parallel rays
            (like a directional light) but whose influence on a
            surface also depends on how far that surface is from the
            imaginary light plane.

            Key idea:
             • L (light direction) is constant — parallel rays.
             • An imaginary plane perpendicular to L sits at a user-
               defined distance d from the origin.
             • Each fragment's "depth" below the plane is:
                   depth = d − dot(P, L)
             • Attenuation scales with depth:
                   atten = 1 / (1 + falloff · depth²)
             • When falloff = 0 → pure directional (no distance effect)
             • Higher falloff → more pronounced gradient; the top of a
               tilted surface (closer to the plane) is visibly brighter
               than the bottom.

            Combined with Half-Lambert wrapping this gives painters
            a very intuitive lighting model to study.

            Copy everything inside createScene into the Babylon.js
            Playground at https://playground.babylonjs.com
            (also include the shared/*.js contents above createScene)
            ============================================================= */
        var canvas = document.getElementById("renderCanvas");
        var engine = new BABYLON.Engine(canvas, true);

        var createScene = function () {
            var ctx = PaintersIllumination.setupScene(canvas, engine);

            // ── Painter's Light Shader ──────────────────────────────────
            BABYLON.Effect.ShadersStore["paintersLightVertexShader"] = "\
        precision highp float;\
        attribute vec3 position;\
        attribute vec3 normal;\
        uniform mat4 world;\
        uniform mat4 worldViewProjection;\
        varying vec3 vNormalW;\
        varying vec3 vPositionW;\
        void main(){\
            vNormalW    = normalize((world * vec4(normal, 0.0)).xyz);\
            vPositionW  = (world * vec4(position, 1.0)).xyz;\
            gl_Position = worldViewProjection * vec4(position, 1.0);\
        }";

            BABYLON.Effect.ShadersStore["paintersLightFragmentShader"] = "\
        precision highp float;\
        uniform vec3  uLightDir;          /* unit vector TOWARD light         */\n\
        uniform vec3  uLightColor;\
        uniform vec3  uDiffuse;\
        uniform vec3  uAmbient;\
        uniform float uLightIntensity;\
        uniform float uAmbientIntensity;\
        uniform float uWrap;              /* 0 = Lambert, 1 = Half-Lambert   */\n\
        uniform float uPlaneDist;         /* distance of light plane along L  */\n\
        uniform float uFalloff;           /* strength of distance attenuation */\n\
        varying vec3  vNormalW;\
        varying vec3  vPositionW;\
        void main(){\
            vec3 N = normalize(vNormalW);\
            vec3 L = normalize(uLightDir);\
            \
            /* --- angular term (Half-Lambert / Lambert) --- */\n\
            float NdotL   = dot(N, L);\
            float diffuse = max((NdotL + uWrap) / (1.0 + uWrap), 0.0);\
            \
            /* --- planar distance attenuation --- */\n\
            /* depth = how far the fragment is below the light plane   */\n\
            /* depth > 0 → fragment is on the lit side, farther = dimmer */\n\
            /* depth ≤ 0 → fragment is past the plane toward light (full brightness) */\n\
            float depth = max(uPlaneDist - dot(vPositionW, L), 0.0);\
            float atten  = 1.0 / (1.0 + uFalloff * depth * depth);\
            \
            vec3 color = uAmbient * uAmbientIntensity\
                       + uDiffuse * uLightColor * diffuse * atten * uLightIntensity;\
            gl_FragColor = vec4(color, 1.0);\
        }";

            // ── Material ────────────────────────────────────────────────
            var mat = new BABYLON.ShaderMaterial("paintersLightMat", ctx.scene,
                { vertex: "paintersLight", fragment: "paintersLight" },
                {
                    attributes: ["position", "normal"],
                    uniforms: ["world", "worldViewProjection",
                        "uLightDir", "uLightColor", "uDiffuse", "uAmbient",
                        "uLightIntensity", "uAmbientIntensity", "uWrap",
                        "uPlaneDist", "uFalloff"]
                });
            mat.setColor3("uDiffuse", new BABYLON.Color3(0.9, 0.25, 0.35));
            mat.setColor3("uLightColor", new BABYLON.Color3(1, 1, 1));
            mat.setColor3("uAmbient", new BABYLON.Color3(0.06, 0.04, 0.08));
            mat.setFloat("uLightIntensity", 4.0);
            mat.setFloat("uAmbientIntensity", 1.0);
            mat.setFloat("uWrap", 1.0);
            mat.setFloat("uPlaneDist", 2.0);
            mat.setFloat("uFalloff", 1.0);
            mat.backFaceCulling = true;
            ctx.setMaterial(mat);

            // ── Light indicator (with uPlaneDist uniform) ───────────────
            var lightCtx = PaintersIllumination.createLightIndicator(ctx, {
                planeDist: 2.0,
                hasPlaneDist: true
            });

            // ── GUI — demo-specific sliders ─────────────────────────────
            PaintersIllumination.createGUI(ctx, lightCtx, [
                {
                    label: "LIGHT PLANE DISTANCE", min: 1, max: 15, value: 2,
                    format: function (v) { return v.toFixed(1); },
                    onChange: function (v) {
                        lightCtx.planeDist = v; mat.setFloat("uPlaneDist", v);
                        lightCtx.updateLight();
                    }
                },
                {
                    label: "DISTANCE FALLOFF", min: 0, max: 5, value: 1.0,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uFalloff", v); }
                },
                {
                    label: "WRAP (0=Lambert, 1=Half)", min: 0, max: 1, value: 1,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uWrap", v); }
                },
                {
                    label: "LIGHT INTENSITY", min: 0, max: 10, value: 4,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uLightIntensity", v); }
                },
                {
                    label: "AMBIENT INTENSITY", min: 0, max: 3, value: 1,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uAmbientIntensity", v); }
                }
            ]);

            return ctx.scene;
        };

        var scene = createScene();
        engine.runRenderLoop(function () { scene.render(); });
        window.addEventListener("resize", function () { engine.resize(); });
    </script>
</body>

</html>
