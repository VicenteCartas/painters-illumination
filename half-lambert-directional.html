<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Half-Lambert Directional Light — Painter's Illumination</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        html,
        body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none
        }
    </style>
</head>

<body>
    <canvas id="renderCanvas"></canvas>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="shared/scene-setup.js"></script>
    <script src="shared/light-indicator.js"></script>
    <script src="shared/gui.js"></script>
    <script>
        /*  =============================================================
            HALF-LAMBERT  DIRECTIONAL  LIGHT
            =============================================================
            Standard Lambert lighting clips to black on any surface
            facing away from the light (N·L < 0).  Valve's "Half-
            Lambert" trick wraps the dot product so that even back-
            facing surfaces receive some illumination:

                diffuse = ((N·L + wrap) / (1 + wrap))²   [optional²]

            In the simpler linear form (no squaring):
                diffuse = max((N·L + wrap) / (1 + wrap), 0)

            When wrap = 0  →  classic Lambert
            When wrap = 1  →  full Half-Lambert (range 0 – 1,
                              back-facing surfaces get ~0.25 or 0.5)

            This model is especially useful for painters because it
            preserves form-readable gradients on the shadow side —
            exactly what you see in real life when ambient light
            wraps around objects.

            Copy everything inside createScene into the Babylon.js
            Playground at https://playground.babylonjs.com
            (also include the shared/*.js contents above createScene)
            ============================================================= */
        var canvas = document.getElementById("renderCanvas");
        var engine = new BABYLON.Engine(canvas, true);

        var createScene = function () {
            var ctx = PaintersIllumination.setupScene(canvas, engine);

            // ── Half-Lambert Shader ─────────────────────────────────────
            BABYLON.Effect.ShadersStore["halfLambertVertexShader"] = "\
        precision highp float;\
        attribute vec3 position;\
        attribute vec3 normal;\
        uniform mat4 world;\
        uniform mat4 worldViewProjection;\
        varying vec3 vNormalW;\
        void main(){\
            vNormalW    = normalize((world * vec4(normal, 0.0)).xyz);\
            gl_Position = worldViewProjection * vec4(position, 1.0);\
        }";

            BABYLON.Effect.ShadersStore["halfLambertFragmentShader"] = "\
        precision highp float;\
        uniform vec3  uLightDir;          /* unit vector TOWARD light       */\n\
        uniform vec3  uLightColor;\
        uniform vec3  uDiffuse;\
        uniform vec3  uAmbient;\
        uniform float uLightIntensity;\
        uniform float uAmbientIntensity;\
        uniform float uWrap;              /* 0 = Lambert, 1 = Half-Lambert */\n\
        varying vec3  vNormalW;\
        void main(){\
            vec3 N = normalize(vNormalW);\
            vec3 L = normalize(uLightDir);\
            \
            /* --- Half-Lambert wrap --- */\n\
            /* Lambert:      max(N·L, 0)               range 0–1          */\n\
            /* Half-Lambert: (N·L + 1) / 2             range 0–1          */\n\
            /* With wrap parameter, blend between the two:                 */\n\
            /*   max((N·L + wrap) / (1 + wrap), 0)                        */\n\
            float NdotL   = dot(N, L);\
            float diffuse = max((NdotL + uWrap) / (1.0 + uWrap), 0.0);\
            \
            vec3 color = uAmbient * uAmbientIntensity\
                       + uDiffuse * uLightColor * diffuse * uLightIntensity;\
            gl_FragColor = vec4(color, 1.0);\
        }";

            // ── Material ────────────────────────────────────────────────
            var mat = new BABYLON.ShaderMaterial("halfLambertMat", ctx.scene,
                { vertex: "halfLambert", fragment: "halfLambert" },
                {
                    attributes: ["position", "normal"],
                    uniforms: ["world", "worldViewProjection",
                        "uLightDir", "uLightColor", "uDiffuse", "uAmbient",
                        "uLightIntensity", "uAmbientIntensity", "uWrap"]
                });
            mat.setColor3("uDiffuse", new BABYLON.Color3(0.9, 0.25, 0.35));
            mat.setColor3("uLightColor", new BABYLON.Color3(1, 1, 1));
            mat.setColor3("uAmbient", new BABYLON.Color3(0.06, 0.04, 0.08));
            mat.setFloat("uLightIntensity", 1.5);
            mat.setFloat("uAmbientIntensity", 1.0);
            mat.setFloat("uWrap", 1.0);
            mat.backFaceCulling = true;
            ctx.setMaterial(mat);

            // ── Light indicator (no uPlaneDist uniform) ─────────────────
            var lightCtx = PaintersIllumination.createLightIndicator(ctx, {
                planeDist: 3.0,
                hasPlaneDist: false
            });

            // ── GUI — demo-specific sliders ─────────────────────────────
            PaintersIllumination.createGUI(ctx, lightCtx, [
                {
                    label: "WRAP (0 = Lambert, 1 = Half-Lambert)", min: 0, max: 1, value: 1,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uWrap", v); }
                },
                {
                    label: "LIGHT INTENSITY", min: 0, max: 5, value: 1.5,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uLightIntensity", v); }
                },
                {
                    label: "AMBIENT INTENSITY", min: 0, max: 3, value: 1,
                    format: function (v) { return v.toFixed(2); },
                    onChange: function (v) { mat.setFloat("uAmbientIntensity", v); }
                }
            ]);

            return ctx.scene;
        };

        var scene = createScene();
        engine.runRenderLoop(function () { scene.render(); });
        window.addEventListener("resize", function () { engine.resize(); });
    </script>
</body>

</html>
